spring.application.name=citas-service
server.port=8083

# =========================
# BASE DE DATOS
# =========================
spring.datasource.url=jdbc:postgresql://localhost:5432/piedrazul_citas
spring.datasource.username=piedrazul
spring.datasource.password=db_piedrazul

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# =========================
# RABBITMQ
# =========================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# =========================
# EXCHANGES DE RABBITMQ
# =========================
rabbitmq.exchange.citas=citas.exchange
rabbitmq.exchange.personas=personas.exchange

# =========================
# ROUTING KEYS PARA EVENTOS DE CITAS
# =========================
rabbitmq.routing.cita-agendada=cita.agendada
rabbitmq.routing.cita-cancelada=cita.cancelada
rabbitmq.routing.cita-reagendada=cita.reagendada

# =========================
# QUEUES PARA CONSUMIR EVENTOS DE PERSONAS-SERVICE
# =========================
rabbitmq.queue.paciente-creado=paciente.creado.queue
rabbitmq.queue.medico-creado=medico.creado.queue
rabbitmq.queue.medico-actualizado=medico.actualizado.queue
rabbitmq.queue.disponibilidad-actualizada=disponibilidad.actualizada.queue

# =========================
# LOGGING
# =========================
logging.level.com.piedrazul.citas=DEBUG
logging.level.org.springframework.amqp=DEBUG